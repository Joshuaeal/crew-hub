networks:
  crew_net:
    driver: overlay

volumes:
  crew_hub_data:
    driver: local
    driver_opts:
      type: "nfs"
      o: "addr=${CREW_NFS_ADDR:-},rw,nfsvers=3,proto=tcp"
      device: ":${CREW_NFS_EXPORT_ROOT:-/export/data}/crew/${CREW_INSTANCE_ID:-crew}/crew-hub-data"
  synapse_data:
    driver: local
    driver_opts:
      type: "nfs"
      o: "addr=${CREW_NFS_ADDR:-},rw,nfsvers=3,proto=tcp"
      device: ":${CREW_NFS_EXPORT_ROOT:-/export/data}/crew/${CREW_INSTANCE_ID:-crew}/synapse"
