  # Reverse proxy notes (apply to whichever proxy terminates TLS for this stack):
  #   • Must proxy WebSocket upgrades (Upgrade / Connection: upgrade headers) — AFFiNE's
  #     real-time sync and collaboration depend on WSS; a proxy that passes HTTP but not WS
  #     will produce a broken-feeling app (page loads, collab silently fails).
  #   • Set AFFINE_SERVER_EXTERNAL_URL before first run — changing it after data exists
  #     causes broken internal links; it is baked into stored document URLs.
