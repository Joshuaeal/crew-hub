  # To enable: remove the leading '#' from each affine* block, deploy the stack, then in
  # Admin → Instance Settings set the AFFiNE URL to https://affine.yourdomain.com.
  #
  # Set these in your .env / Docker Swarm secrets / Portainer env:
  #   AFFINE_DB_PASSWORD      strong password for the affine Postgres user
  #   AFFINE_ADMIN_EMAIL      email of the initial AFFiNE admin account
  #   AFFINE_ADMIN_PASSWORD   password for that admin account
  #   AFFINE_EXTERNAL_URL     https://affine.yourdomain.com (confirm subdomain with Josh)
  #   AFFINE_NODE_HOSTNAME    (optional) pin to a specific swarm node for stable volume access

