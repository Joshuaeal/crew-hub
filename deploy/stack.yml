version: "3.9"

services:
  crew-hub:
    # Official image published to GHCR on every push to main.
    # Override CREW_HUB_IMAGE / CREW_HUB_TAG to use a local build.
    image: "${CREW_HUB_IMAGE:-ghcr.io/joshuaeal/crew-hub}:${CREW_HUB_TAG:-latest}"
    ports:
      - target: 3000
        published: ${CREW_HUB_PORT:-38471}
        protocol: tcp
        mode: ingress
    environment:
      MATRIX_UPSTREAM_URL: "http://synapse:8008"
      SYNAPSE_SERVER_NAME: "${SYNAPSE_SERVER_NAME:-localhost}"
      CREW_SYNAPSE_SERVER_NAME: "${CREW_SYNAPSE_SERVER_NAME:-localhost}"
      CREW_MATRIX_DEFAULT_ROOM_ID: "${CREW_MATRIX_DEFAULT_ROOM_ID:-}"
      SYNAPSE_ADMIN_PORT: "${SYNAPSE_ADMIN_PORT:-18088}"
      CREW_SESSION_SECRET: "${CREW_SESSION_SECRET:-}"
      CREW_MATRIX_SEED_USER: "${CREW_MATRIX_SEED_USER:-}"
      CREW_MATRIX_SEED_PASSWORD: "${CREW_MATRIX_SEED_PASSWORD:-}"
      CREW_SYNAPSE_ADMIN_ACCESS_TOKEN: "${CREW_SYNAPSE_ADMIN_ACCESS_TOKEN:-}"
      CREW_MATRIX_SYNC_ENABLED: "${CREW_MATRIX_SYNC_ENABLED:-}"
      # Whisper ASR (voice transcription) — points to the whisper-asr service
      WHISPER_ASR_URL: "http://whisper-asr:9000"
      NEXT_PUBLIC_CREW_PUBLIC_URL: "${NEXT_PUBLIC_CREW_PUBLIC_URL:-}"
      NEXT_PUBLIC_SERVICE_SYNAPSE_URL: "${NEXT_PUBLIC_SERVICE_SYNAPSE_URL:-}"
      NEXT_PUBLIC_MATRIX_HOMESERVER_URL: "${NEXT_PUBLIC_MATRIX_HOMESERVER_URL:-}"
      NEXT_PUBLIC_SERVICE_MATRIX_CLIENT_URL: "${NEXT_PUBLIC_SERVICE_MATRIX_CLIENT_URL:-}"
      NEXT_PUBLIC_VDO_NINJA_ROOM_PASSWORD: "${NEXT_PUBLIC_VDO_NINJA_ROOM_PASSWORD:-}"
      SMTP_HOST: "${SMTP_HOST:-}"
      SMTP_PORT: "${SMTP_PORT:-}"
      SMTP_USER: "${SMTP_USER:-}"
      SMTP_PASS: "${SMTP_PASS:-}"
      SMTP_FROM: "${SMTP_FROM:-}"
      SMTP_SECURE: "${SMTP_SECURE:-}"
    volumes:
      - crew_hub_data:/app/.data
    networks:
      - crew_net
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      update_config:
        order: start-first

  synapse:
    image: matrixdotorg/synapse:latest
    ports:
      - target: 8008
        published: ${SYNAPSE_PORT:-8008}
        protocol: tcp
        mode: ingress
    environment:
      SYNAPSE_SERVER_NAME: "${SYNAPSE_SERVER_NAME:-localhost}"
      SYNAPSE_REPORT_STATS: "${SYNAPSE_REPORT_STATS:-no}"
    volumes:
      - synapse_data:/data
    networks:
      - crew_net
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      # Pin Synapse to one node so its volume data stays consistent.
      # Set SYNAPSE_NODE_HOSTNAME in your environment, or remove this
      # constraint if you are using a single-node swarm.
      placement:
        constraints:
          - "node.hostname == ${SYNAPSE_NODE_HOSTNAME:-}"

  synapse-admin:
    image: awesometechnologies/synapse-admin:latest
    ports:
      - target: 80
        published: ${SYNAPSE_ADMIN_PORT:-18088}
        protocol: tcp
        mode: ingress
    networks:
      - crew_net
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  livekit:
    image: livekit/livekit-server:latest
    command: --config /livekit.yaml
    ports:
      - target: 7880
        published: ${LIVEKIT_PORT:-7880}
        protocol: tcp
        mode: ingress
      - target: 7881
        published: 7881
        protocol: tcp
        mode: ingress
      - target: 50100
        published: 50100
        protocol: udp
        mode: ingress
    volumes:
      - livekit_config:/livekit.yaml
    networks:
      - crew_net
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  whisper-asr:
    # Local Whisper speech-to-text — no audio leaves the server.
    # Scale to 1 to enable: docker service scale crew_whisper-asr=1
    # Or set WHISPER_ASR_REPLICAS=1 before deploying.
    image: onerahmet/openai-whisper-asr-webservice:latest
    ports:
      - target: 9000
        published: ${WHISPER_ASR_PORT:-9000}
        protocol: tcp
        mode: ingress
    environment:
      ASR_MODEL: "${WHISPER_ASR_MODEL:-base.en}"
    networks:
      - crew_net
    deploy:
      replicas: ${WHISPER_ASR_REPLICAS:-0}
      restart_policy:
        condition: on-failure

  # ── AFFiNE self-hosted workspace ──────────────────────────────────────────────
  # AFFiNE is a separate full-stack service (its own Postgres + Redis) exposed at
  # a dedicated subdomain (e.g. affine.alegrevisual.com) behind the same Cloudflare
  # Tunnel / reverse proxy used by the rest of the stack.
